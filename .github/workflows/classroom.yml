name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Test 1
      id: test-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 1
        setup-command: ''
        command: gcc srtf.c -o srtf && ./srtf
        input: |-
          5
          P1 2 6
          P2 5 2
          P3 1 8
          P4 0 3
          P5 4 4
        expected-output: |-
          Waiting Time:
          P1 7
          P2 0
          P3 14
          P4 0
          P5 2
          Turnaround Time:
          P1 13
          P2 2
          P3 22
          P4 3
          P5 6
          Average Waiting Time: 4.6
          Average Turnaround Time: 9.2
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 2
      id: test-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 2
        setup-command: ''
        command: gcc srtf.c -o srtf && ./srtf
        input: |-
          3
          P1 0 5
          P2 1 3
          P3 2 2
        expected-output: |-
          Waiting Time:
          P1 5
          P2 0
          P3 2
          Turnaround Time:
          P1 10
          P2 3
          P3 4
          Average Waiting Time: 2.3
          Average Turnaround Time: 5.7
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 3
      id: test-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 3
        setup-command: ''
        command: gcc srtf.c -o srtf && ./srtf
        input: |-
          4
          P1 0 7
          P2 2 4
          P3 4 1
          P4 5 4
        expected-output: |-
          Waiting Time:
          P1 9
          P2 1
          P3 0
          P4 2
          Turnaround Time:
          P1 16
          P2 5
          P3 1
          P4 6
          Average Waiting Time: 3.0
          Average Turnaround Time: 7.0
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 4
      id: test-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 4
        setup-command: ''
        command: gcc srtf.c -o srtf && ./srtf
        input: |-
          P1 1 4
          P2 2 2
          P3 3 1
        expected-output: |-
          Waiting Time:
          P1 3
          P2 0
          P3 1
          Turnaround Time:
          P1 7
          P2 2
          P3 2
          Average Waiting Time: 1.3
          Average Turnaround Time: 3.7
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 5
      id: test-5
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 5
        setup-command: ''
        command: gcc srtf.c -o srtf && ./srtf
        input: |-
          4
          P1 0 6
          P2 1 2
          P3 2 4
          P4 3 3
        expected-output: |-
          Waiting Time:
          P1 9
          P2 0
          P3 4
          P4 0
          Turnaround Time:
          P1 15
          P2 2
          P3 8
          P4 3
          Average Waiting Time: 3.2
          Average Turnaround Time: 7.0
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1_RESULTS: "${{steps.test-1.outputs.result}}"
        TEST-2_RESULTS: "${{steps.test-2.outputs.result}}"
        TEST-3_RESULTS: "${{steps.test-3.outputs.result}}"
        TEST-4_RESULTS: "${{steps.test-4.outputs.result}}"
        TEST-5_RESULTS: "${{steps.test-5.outputs.result}}"
      with:
        runners: test-1,test-2,test-3,test-4,test-5
